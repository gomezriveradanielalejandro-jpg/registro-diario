<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Control Diario - Joyería</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef1f5;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #1e88e5;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            max-width: 850px;
            margin: auto;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input,
        select,
        button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background: #1e88e5;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #1565c0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .pago-visualizacion {
            background: #fff9c4;
            padding: 15px;
            margin-top: 10px;
            border: 2px dashed #fbc02d;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            color: #827717;
        }

        /* Círculos de Resumen */
        .resumen-visual {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .indicador {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .capital-dia {
            border: 6px solid #4caf50;
            color: #2e7d32;
        }

        /* Verde */
        .capital-gastado {
            border: 6px solid #1e88e5;
            color: #1565c0;
        }

        /* Azul */
        .capital-restante {
            border: 6px solid #ff9800;
            color: #e65100;
        }

        /* Naranja */
        .capital-gramos {
            border: 6px solid #9c27b0;
            color: #7b1fa2;
        }

        /* Morado */
        .alerta-negativo {
            border-color: #e53935 !important;
            color: #b71c1c !important;
            background-color: #ffebee !important;
        }

        .monto {
            font-size: 0.95em;
        }

        .etiqueta {
            font-size: 0.65em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }

        .btn-detalle {
            background: #4caf50;
            width: auto;
            padding: 5px 12px;
            font-size: 0.85em;
        }

        .delete-btn {
            background: #e53935;
            width: auto;
            padding: 2px 8px;
        }
    </style>
</head>

<body>

    <h1>Control Diario Original</h1>

    <!-- SECCIÓN DE CAPITAL -->
    <div class="card">
        <h3>Información del Día</h3>
        <label>Fecha</label>
        <input type="date" id="fecha">
        <label>Capital Inicial (Base)</label>
        <input type="number" id="capitalInicial" placeholder="0.00">
        <label>Monto Extra</label>
        <input type="number" id="montoExtra" placeholder="Ej: +500">
        <button onclick="actualizarCapital()">Actualizar Capital</button>

        <div class="resumen-visual">
            <div class="indicador capital-dia">
                <span class="etiqueta">Capital Día</span>
                <span class="monto">$<span id="v_total">0</span></span>
            </div>
            <div class="indicador capital-gastado">
                <span class="etiqueta">Gastado</span>
                <span class="monto">$<span id="v_gastado">0</span></span>
            </div>
            <div class="indicador capital-restante" id="circuloNaranja">
                <span class="etiqueta">Restante</span>
                <span class="monto">$<span id="capitalRestante">0</span></span>
            </div>
            <div class="indicador capital-gramos">
                <span class="etiqueta">Total Gramos</span>
                <span class="monto"><span id="v_totalGramos">0</span> g</span>
            </div>
        </div>
    </div>

    <!-- SECCIÓN DE REGISTRO -->
    <div class="card">
        <h3>Registrar Compra</h3>
        <label>Cliente</label>
        <select id="cliente">
            <option>Pablo Lerdo</option>
            <option>Doña Aurora</option>
            <option>Señora Mari</option>
            <option>Don Arturo</option>
            <option>Doña Mago</option>
            <option>Doña Rosi</option>
            <option>Carlitros</option>
            <option>Manuelito</option>
            <option>Victorinox</option>
            <option>Señora Ana</option>
            <option>Joselito</option>
            <option>Cecar</option>
            <option>Omar</option>
            <option>Pocho</option>
            <option>Chonchis</option>
            <option>Señora Lulu</option>
            <option>Pablo</option>
            <option>Tocayo</option>
            <option>Hermana del Tocayo</option>
            <option>Señora Sonia</option>
            <option>Fredy Venezuela</option>
        </select>

        <label>Gramos</label>
        <input type="number" id="gramos" oninput="calcularPago()" step="0.01">

        <label>Ley</label>
        <select id="ley">
            <option value="999">999</option>
            <option value="925">925</option>
            <option value="910">910</option>
            <option value="900">900</option>
            <option value="830">830</option>
            <option value="800">800</option>
            <option value="720">720</option>
            <option value="600">600</option>
            <option value="500">500</option>
            <option value="400">400</option>
            <option value="300">300</option>
            <option value="100">100</option>
        </select>

        <label>Costo por gramo</label>
        <input type="number" id="costoGramo" oninput="calcularPago()" step="0.01">

        <div class="pago-visualizacion">Cantidad a Pagar: $<span id="pagoTotal">0</span></div>
        <button onclick="guardarCompra()" style="background:#2e7d32; margin-top:10px;">Guardar Compra</button>
    </div>

    <!-- SECCIÓN DE RESUMEN -->
    <div class="card">
        <h3>Resumen de Clientes</h3>
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Total Peso</th>
                    <th>Total Pagado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaCompras"></tbody>
        </table>

        <h4>Resumen de Peso por Ley</h4>
        <table id="tablaResumenLeyes"></table>


        <button onclick="limpiarTodo()" style="background:#607d8b;">Limpiar Todo el Día</button>
    </div>

    <!-- VENTANA DE DETALLE (MODAL) -->
    <div id="miModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 id="modalTitulo">Historial</h3>
            <table id="contenidoModal"></table>
        </div>
    </div>

    <script>
        // VARIABLES GLOBALES
        let compras = JSON.parse(localStorage.getItem("compras")) || [];
        let capitalAcumulado = Number(localStorage.getItem("capitalGuardado")) || 0;

        document.getElementById("fecha").valueAsDate = new Date();

        function calcularPago() {
            let g = Number(document.getElementById("gramos").value) || 0;
            let c = Number(document.getElementById("costoGramo").value) || 0;
            document.getElementById("pagoTotal").innerText = (g * c).toLocaleString('en-US');
        }

        function actualizarCapital() {
            let inicial = Number(document.getElementById("capitalInicial").value) || 0;
            let extra = Number(document.getElementById("montoExtra").value) || 0;

            if (capitalAcumulado === 0 && inicial > 0) {
                capitalAcumulado = inicial + extra;
            } else {
                capitalAcumulado += extra;
            }

            // Bloquear inicial si ya hay base
            if (capitalAcumulado > 0) document.getElementById("capitalInicial").disabled = true;

            // Limpiar extra y guardar
            document.getElementById("montoExtra").value = "";
            localStorage.setItem("capitalGuardado", capitalAcumulado);
            actualizarVista();
        }

        function guardarCompra() {
            let cl = document.getElementById("cliente").value;
            let gr = Number(document.getElementById("gramos").value);
            let ly = document.getElementById("ley").value;
            let co = Number(document.getElementById("costoGramo").value);

            if (!gr || !co) return alert("Por favor, ingresa gramos y costo.");

            compras.push({
                id: Date.now(),
                cliente: cl,
                gramos: gr,
                ley: ly,
                costo: co,
                total: gr * co
            });
            localStorage.setItem("compras", JSON.stringify(compras));

            // Limpiar campos de registro
            document.getElementById("gramos").value = "";
            document.getElementById("costoGramo").value = "";
            document.getElementById("pagoTotal").innerText = "0";

            actualizarVista();
        }

        function actualizarVista() {
            let tabla = document.getElementById("tablaCompras");
            let tablaLeyes = document.getElementById("tablaResumenLeyes");
            tabla.innerHTML = "";
            tablaLeyes.innerHTML = "<thead><tr><th>Ley</th><th>Peso Acumulado (g)</th></tr></thead><tbody>";

            let dineroGastado = 0;
            let gramosTotales = 0;
            let resL = {};
            let resC = {};

            compras.forEach(c => {
                dineroGastado += c.total;
                gramosTotales += c.gramos;
                resL[c.ley] = (resL[c.ley] || 0) + c.gramos;
                if (!resC[c.cliente]) resC[c.cliente] = {
                    g: 0,
                    t: 0
                };
                resC[c.cliente].g += c.gramos;
                resC[c.cliente].t += c.total;
            });

            // Llenar tabla de clientes
            for (let cl in resC) {
                tabla.innerHTML += `<tr><td><strong>${cl}</strong></td><td>${resC[cl].g.toLocaleString('en-US')} g</td><td>$${resC[cl].t.toLocaleString('en-US')}</td><td><button class="btn-detalle" onclick="abrirDetalle('${cl}')">Ver Detalle</button></td></tr>`;
            }
            // Llenar tabla de leyes
            for (let l in resL) {
                tablaLeyes.innerHTML += `<tr><td>${l}</td><td>${resL[l].toLocaleString('en-US')} g</td></tr>`;
            }

            // ACTUALIZAR LOS 4 CÍRCULOS
            let restante = capitalAcumulado - dineroGastado;
            document.getElementById("v_total").innerText = capitalAcumulado.toLocaleString('en-US');
            document.getElementById("v_gastado").innerText = dineroGastado.toLocaleString('en-US');
            document.getElementById("capitalRestante").innerText = restante.toLocaleString('en-US');
            document.getElementById("v_totalGramos").innerText = gramosTotales.toLocaleString('en-US');

            // Alerta visual si el saldo es negativo
            let circuloN = document.getElementById("circuloNaranja");
            restante < 0 ? circuloN.classList.add('alerta-negativo') : circuloN.classList.remove('alerta-negativo');

            // Mantener bloqueado el inicial si hay datos
            if (capitalAcumulado > 0) document.getElementById("capitalInicial").disabled = true;
        }

        function abrirDetalle(cliente) {
            const cont = document.getElementById("contenidoModal");
            document.getElementById("modalTitulo").innerText = "Historial: " + cliente;
            cont.innerHTML = "<thead><tr><th>Ley</th><th>Peso</th><th>Subtotal</th><th></th></tr></thead><tbody>";

            compras.filter(c => c.cliente === cliente).forEach(item => {
                cont.innerHTML += `<tr><td>${item.ley}</td><td>${item.gramos} g</td><td>$${item.total.toLocaleString('en-US')}</td><td><button class="delete-btn" onclick="eliminarRegistro(${item.id},'${cliente}')">✕</button></td></tr>`;
            });
            document.getElementById("miModal").style.display = "block";
        }

        function eliminarRegistro(id, cl) {
            if (confirm("¿Eliminar esta compra específica?")) {
                compras = compras.filter(c => c.id !== id);
                localStorage.setItem("compras", JSON.stringify(compras));
                compras.some(c => c.cliente === cl) ? abrirDetalle(cl) : cerrarModal();
                actualizarVista();
            }
        }

        function cerrarModal() {
            document.getElementById("miModal").style.display = "none";
        }
        window.onclick = e => {
            if (e.target == document.getElementById("miModal")) cerrarModal();
        }



        function limpiarTodo() {
            if (confirm("¿Estás seguro de que quieres borrar TODOS los registros y el capital del día?")) {
                localStorage.clear();
                compras = [];
                capitalAcumulado = 0;
                let inputI = document.getElementById("capitalInicial");
                inputI.disabled = false;
                inputI.value = "";
                document.getElementById("montoExtra").value = "";
                actualizarVista();
                alert("Día reiniciado.");
            }
        }

        // Carga inicial al abrir la página
        actualizarVista();
    </script>
</body>

</html>
