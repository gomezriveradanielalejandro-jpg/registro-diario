<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Control Diario ORIGINAL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef1f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        input,
        select,
        button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1e88e5;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1565c0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border-bottom: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .delete-btn {
            background: #e53935;
        }

        .totales {
            margin-top: 15px;
            font-weight: bold;
        }

        .capital-box {
            font-size: 18px;
            margin-top: 10px;
        }

        /* Estilo para el nuevo cuadro de pago */
        .pago-visualizacion {
            background: #fff9c4;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #fbc02d;
            font-weight: bold;
            text-align: center;
        }

        /* Estilos para el Modal y Botones de Detalle */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }

        .close:hover {
            color: #000;
        }

        .btn-detalle {
            background: #4caf50;
            color: white;
            width: auto;
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .resumen-visual {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .indicador {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .capital-dia {
            border: 6px solid #4caf50;
            color: #2e7d32;
        }

        /* Verde */
        .capital-restante {
            border: 6px solid #ff9800;
            color: #e65100;
        }

        /* Naranja */
        .monto {
            font-size: 1.1em;
        }

        .etiqueta {
            font-size: 0.7em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .alerta-negativo {
            border-color: #e53935 !important;
            color: #b71c1c !important;
            background-color: #ffebee !important;
        }

        .capital-gastado {
            border: 6px solid #1e88e5;
            color: #1565c0;
        }

        /* Azul */
    </style>
</head>

<body>

    <h1>Nombre Empresa HTLM ORIGINAL</h1>

    <div class="card">
        <h3>Información del Día</h3>
        <label>Fecha</label>
        <input type="date" id="fecha">

        <label>Capital Inicial (Base)</label>
        <input type="number" id="capitalInicial" placeholder="0.00">

        <label>Monto Extra</label>
        <input type="number" id="montoExtra" placeholder="Ej: +500">

        <button onclick="actualizarCapital()">Actualizar Capital</button>

        <div class="resumen-visual">
            <!-- Círculo Verde -->
            <div class="indicador capital-dia">
                <span class="etiqueta">Capital Día</span>
                <span class="monto">$<span id="v_total">0</span></span>
            </div>

            <!-- NUEVO: Círculo Azul -->
            <div class="indicador capital-gastado">
                <span class="etiqueta">Gastado</span>
                <span class="monto">$<span id="totalGastado">0</span></span>
            </div>

            <!-- Círculo Naranja/Rojo -->
            <div class="indicador capital-restante">
                <span class="etiqueta">Restante</span>
                <span class="monto">$<span id="capitalRestante">0</span></span>
            </div>
        </div>

    </div>


    <div class="card">
        <h3>Registrar Compra</h3>
        <label>Cliente</label>
        <select id="cliente">
            <option>Poncho</option>
            <option>Pablo</option>
            <option>Omomar</option>
            <option>Cesar</option>
        </select>

        <label>Gramos</label>
        <input type="number" id="gramos" oninput="calcularPago()">

        <label>Ley</label>
        <select id="ley">
            <option value="999">999</option>
            <option value="925">925</option>
            <option value="910">910</option>
            <option value="900">900</option>
            <option value="830">830</option>
            <option value="800">800</option>
            <option value="720">720</option>
            <option value="600">600</option>
            <option value="500">500</option>
            <option value="400">400</option>
            <option value="300">300</option>
            <option value="100">100</option>
        </select>

        <label>Costo por gramo</label>
        <input type="number" id="costoGramo" oninput="calcularPago()">

        <div class="pago-visualizacion">
            Cantidad a Pagar: $<span id="pagoTotal">0</span>
        </div>

        <button onclick="guardarCompra()">Guardar Compra</button>
    </div>

    <div class="card">
        <h3>Resumen del Día</h3>
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Gramos</th>
                    <th>Total</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaCompras"></tbody>
        </table>

        <h4>Resumen de Peso por Ley</h4>
        <table>
            <thead>
                <tr>
                    <th>Ley</th>
                    <th>Peso Total (g)</th>
                </tr>
            </thead>
            <tbody id="tablaResumenLeyes"></tbody>
        </table>


        <button onclick="limpiarTodo()" style="background:#607d8b; margin-top:20px;">Limpiar Todo el Día</button>

    </div>

    <script>
        let capital = 0;
        let compras = JSON.parse(localStorage.getItem("compras")) || [];

        document.getElementById("fecha").valueAsDate = new Date();

        function calcularPago() {
            let gramos = Number(document.getElementById("gramos").value) || 0;
            let costo = Number(document.getElementById("costoGramo").value) || 0;
            let total = gramos * costo;
            document.getElementById("pagoTotal").innerText = total.toLocaleString('en-US');
        }


        let capitalAcumulado = 0; // Variable global para el total

        let capitalTotalAcumulado = 0;

        function actualizarCapital() {
            let inicial = Number(document.getElementById("capitalInicial").value) || 0;
            let extra = Number(document.getElementById("montoExtra").value) || 0;

            // Si es la primera vez, sumamos base + extra. Luego solo sumamos extras.
            if (capitalTotalAcumulado === 0 && inicial > 0) {
                capitalTotalAcumulado = inicial + extra;
                document.getElementById("capitalInicial").disabled = true;
            } else {
                capitalTotalAcumulado += extra;
            }

            // Limpieza automática del campo extra
            document.getElementById("montoExtra").value = "";

            actualizarVista();
        }



        function guardarCompra() {
            let cliente = document.getElementById("cliente").value;
            let gramos = Number(document.getElementById("gramos").value);
            let ley = document.getElementById("ley").value;
            let costo = Number(document.getElementById("costoGramo").value);

            if (!gramos || !costo) return alert("Completa los datos");

            let total = gramos * costo;
            compras.push({
                cliente,
                gramos,
                ley,
                costo,
                total
            });
            localStorage.setItem("compras", JSON.stringify(compras));

            // --- AGREGA ESTAS LÍNEAS AQUÍ ---
            document.getElementById("gramos").value = "";
            document.getElementById("costoGramo").value = "";
            document.getElementById("pagoTotal").innerText = "0";
            // --------------------------------

            actualizarVista();
        }


        function eliminarCompra(index) {
            compras.splice(index, 1);
            localStorage.setItem("compras", JSON.stringify(compras));
            actualizarVista();
        }

        function actualizarVista() {
            let tabla = document.getElementById("tablaCompras"); // Tu tabla de clientes
            let tablaResumen = document.getElementById("tablaResumenLeyes");
            tabla.innerHTML = "";
            if (tablaResumen) tablaResumen.innerHTML = "";

            let totalGastado = 0;
            let resumenLeyes = {};
            let resumenClientes = {};

            compras.forEach(c => {
                totalGastado += c.total;
                resumenLeyes[c.ley] = (resumenLeyes[c.ley] || 0) + c.gramos;

                if (!resumenClientes[c.cliente]) resumenClientes[c.cliente] = {
                    gramos: 0,
                    total: 0
                };
                resumenClientes[c.cliente].gramos += c.gramos;
                resumenClientes[c.cliente].total += c.total;
            });

            // AQUÍ ESTÁ EL CAMBIO: Solo 4 columnas
            for (let cl in resumenClientes) {
                tabla.innerHTML += `
            <tr>
                <td><strong>${cl}</strong></td>
                <td>${resumenClientes[cl].gramos.toLocaleString('en-US')} g</td>
                <td>$${resumenClientes[cl].total.toLocaleString('en-US')}</td>
                <td><button class="btn-detalle" onclick="abrirDetalle('${cl}')">Ver Detalle</button></td>
            </tr>`;
            }

            if (tablaResumen) {
                for (let l in resumenLeyes) {
                    tablaResumen.innerHTML += `<tr><td>${l}</td><td>${resumenLeyes[l].toLocaleString('en-US')} g</td></tr>`;
                }
            }

            let restante = capitalTotalAcumulado - totalGastado;
            document.getElementById("v_total").innerText = capitalTotalAcumulado.toLocaleString('en-US');
            document.getElementById("totalGastado").innerText = totalGastado.toLocaleString('en-US');

            let spanRestante = document.getElementById("capitalRestante");
            spanRestante.innerText = restante.toLocaleString('en-US');

            // Cambio de color si es negativo
            let circuloNaranja = spanRestante.closest('.indicador');
            if (restante < 0) {
                circuloNaranja.classList.add('alerta-negativo');
            } else {
                circuloNaranja.classList.remove('alerta-negativo');
            }
        }


        function abrirDetalle(nombreCliente) {
            const modal = document.getElementById("miModal");
            const titulo = document.getElementById("modalTitulo");
            const contenido = document.getElementById("contenidoModal");

            titulo.innerText = "Historial: " + nombreCliente;
            contenido.innerHTML = "";

            compras.forEach((item, index) => {
                if (item.cliente === nombreCliente) {
                    contenido.innerHTML += `
                <tr>
                    <td>${item.ley}</td>
                    <td>${item.gramos.toLocaleString('en-US')} g</td>
                    <td>$${item.total.toLocaleString('en-US')}</td>
                    <td><button class="delete-btn" style="width:auto; padding:2px 8px;" onclick="eliminarRegistro(${index}, '${nombreCliente}')">✕</button></td>
                </tr>`;
                }
            });
            modal.style.display = "block";
        }

        function cerrarModal() {
            document.getElementById("miModal").style.display = "none";
        }

        function eliminarRegistro(index, nombreCliente) {
            if (confirm("¿Eliminar este registro?")) {
                compras.splice(index, 1);
                localStorage.setItem("compras", JSON.stringify(compras));
                const todaviaTiene = compras.some(c => c.cliente === nombreCliente);
                if (!todaviaTiene) cerrarModal();
                else abrirDetalle(nombreCliente);
                actualizarVista();
            }
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById("miModal")) cerrarModal();
        }



        actualizarVista();

        function limpiarTodo() {
            if (confirm("¿Estás seguro de borrar TODOS los registros del día?")) {
                localStorage.removeItem("compras");
                compras = [];

                // Reiniciamos la variable de capital acumulado a cero
                capitalTotalAcumulado = 0;

                // Limpiamos los inputs
                let inputInicial = document.getElementById("capitalInicial");
                inputInicial.value = "";
                inputInicial.disabled = false; // DESBLOQUEA el campo para volver a escribir

                document.getElementById("montoExtra").value = "";

                // Resetear visualización
                actualizarVista();
                alert("Día reiniciado correctamente.");
            }
        }
    </script>
    <!-- Estructura de la Ventana Flotante -->
    <div id="miModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 id="modalTitulo">Detalles</h3>
            <table>
                <thead>
                    <tr>
                        <th>Ley</th>
                        <th>Peso</th>
                        <th>Subtotal</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="contenidoModal"></tbody>
            </table>
        </div>
    </div>

</body>

</html>
